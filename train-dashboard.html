<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NMBS Live — Diest &amp; Halle</title>
<style>
  :root {
    --bg: #0b0f1a;
    --panel: #121a2b;
    --panel-2: #0e1626;
    --line: #1f2c45;
    --text: #e8eefc;
    --muted: #8294b8;
    --amber: #ffb400;
    --green: #38d39f;
    --red: #ff5d5d;
    --accent: #4d9bff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, #14213b 0%, transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    padding: 24px clamp(12px, 3vw, 40px) 48px;
  }
  header.top {
    display: flex; align-items: center; flex-wrap: wrap; gap: 16px;
    max-width: 1200px; margin: 0 auto 22px;
  }
  .brand { display: flex; align-items: baseline; gap: 12px; }
  .brand h1 { font-size: clamp(20px, 3vw, 28px); margin: 0; letter-spacing: .3px; }
  .brand .sub { color: var(--muted); font-size: 13px; }
  .controls { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  .updated { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
  button.refresh {
    appearance: none; border: 1px solid var(--accent); cursor: pointer;
    background: linear-gradient(180deg, #2f6fd6, #1f57b8);
    color: #fff; font-size: 14px; font-weight: 600;
    padding: 10px 18px; border-radius: 10px; display: inline-flex; align-items: center; gap: 8px;
    transition: transform .08s ease, filter .15s ease;
  }
  button.refresh:hover { filter: brightness(1.1); }
  button.refresh:active { transform: translateY(1px); }
  button.refresh[disabled] { opacity: .6; cursor: progress; }
  .spin { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4);
    border-top-color: #fff; border-radius: 50%; animation: rot .7s linear infinite; }
  @keyframes rot { to { transform: rotate(360deg); } }

  .grid { max-width: 1200px; margin: 0 auto; display: grid; gap: 22px;
    grid-template-columns: repeat(2, minmax(0, 1fr)); }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

  .panel { background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--line); border-radius: 16px; overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,.35); }
  .panel h2 { margin: 0; padding: 16px 18px; font-size: 18px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--line); background: rgba(255,255,255,.02); }
  .panel h2 .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); }
  .panel h2 .count { margin-left: auto; color: var(--muted); font-size: 13px; font-weight: 500; }

  .row { display: grid; grid-template-columns: 62px 1fr auto; gap: 12px; align-items: center;
    padding: 11px 18px; border-bottom: 1px solid rgba(255,255,255,.04); }
  .row:last-child { border-bottom: none; }
  .row.canceled .dest { text-decoration: line-through; color: var(--muted); }

  .time { font-variant-numeric: tabular-nums; font-weight: 700; font-size: 18px; }
  .time .delay { display: block; font-size: 12px; font-weight: 600; }
  .delay.ontime { color: var(--green); }
  .delay.late { color: var(--amber); }

  .dest { min-width: 0; }
  .dest .name { font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dest .meta { color: var(--muted); font-size: 12.5px; margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
  .veh { display: inline-block; padding: 1px 7px; border-radius: 6px; font-size: 11.5px; font-weight: 700;
    background: rgba(77,155,255,.16); color: var(--accent); }
  .badge-cancel { color: var(--red); font-weight: 700; }
  .badge-extra { color: var(--green); font-weight: 600; }
  .occ { font-size: 11px; }

  .plat { text-align: center; min-width: 54px; }
  .plat .lbl { display: block; font-size: 10px; color: var(--muted); letter-spacing: .5px; }
  .plat .val { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .plat.changed .val { color: var(--amber); }
  .plat.changed .lbl { color: var(--amber); }

  .empty, .error { padding: 26px 18px; color: var(--muted); font-size: 14px; }
  .error { color: var(--red); }

  /* ---- Diest -> Halle direct tracker ---- */
  .tracker { max-width: 1200px; margin: 22px auto 0; }
  .tracker .panel h2 .route { color: var(--muted); font-weight: 500; font-size: 14px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line);
    border-bottom: 1px solid var(--line); }
  @media (max-width: 560px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: var(--panel-2); padding: 14px 18px; }
  .stat .k { font-size: 12px; color: var(--muted); letter-spacing: .4px; text-transform: uppercase; }
  .stat .v { font-size: 24px; font-weight: 700; margin-top: 3px; font-variant-numeric: tabular-nums; }
  .stat .v.good { color: var(--green); }
  .stat .v.warn { color: var(--amber); }
  .stat .v.bad { color: var(--red); }
  table.trips { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.trips th, table.trips td { padding: 9px 18px; text-align: left; border-bottom: 1px solid rgba(255,255,255,.04); }
  table.trips th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
  table.trips td { font-variant-numeric: tabular-nums; }
  table.trips tr.late td.d { color: var(--amber); font-weight: 600; }
  table.trips tr.vlate td.d { color: var(--red); font-weight: 700; }
  table.trips tr.canc td { color: var(--red); text-decoration: line-through; }
  table.trips tr.canc td.s { text-decoration: none; }
  .ic { display: inline-block; padding: 1px 7px; border-radius: 6px; font-size: 12px; font-weight: 700;
    background: rgba(77,155,255,.16); color: var(--accent); }
  footer { max-width: 1200px; margin: 26px auto 0; color: var(--muted); font-size: 12px; text-align: center; }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <header class="top">
    <div class="brand">
      <h1>🚆 Live Departures</h1>
      <span class="sub">NMBS / SNCB — Diest &amp; Halle</span>
    </div>
    <div class="controls">
      <span class="updated" id="updated">Not loaded yet</span>
      <button class="refresh" id="refresh" onclick="loadAll()">
        <span id="btn-label">Refresh</span>
      </button>
    </div>
  </header>

  <div class="grid">
    <section class="panel" id="panel-Diest">
      <h2><span class="dot"></span> Diest <span class="count" id="count-Diest"></span></h2>
      <div class="body" id="body-Diest"><div class="empty">Loading…</div></div>
    </section>
    <section class="panel" id="panel-Halle">
      <h2><span class="dot"></span> Halle <span class="count" id="count-Halle"></span></h2>
      <div class="body" id="body-Halle"><div class="empty">Loading…</div></div>
    </section>
  </div>

  <div class="tracker">
    <section class="panel">
      <h2><span class="dot"></span> Direct tracker
        <span class="route">Diest&nbsp;→&nbsp;Halle &middot; today</span>
        <span class="count" id="tracker-count"></span>
      </h2>
      <div class="stats" id="tracker-stats"></div>
      <div id="tracker-body"><div class="empty">Loading…</div></div>
    </section>
  </div>

  <footer>
    Data: <a href="https://docs.irail.be/" target="_blank" rel="noopener">iRail open API</a> (live NMBS/SNCB data).
    Times shown in station local time.
  </footer>

<script>
const STATIONS = ["Diest", "Halle"];
const API = "https://api.irail.be/v1/liveboard";

function fmtTime(unix) {
  const d = new Date(unix * 1000);
  return d.toLocaleTimeString("nl-BE", { hour: "2-digit", minute: "2-digit", hour12: false });
}
function occupancyLabel(occ) {
  const id = (occ && occ.name) || "unknown";
  const map = { low: "🟢 quiet", medium: "🟠 busy", high: "🔴 full", unknown: "" };
  return map[id] || "";
}

function renderDeparture(dep) {
  const delaySec = parseInt(dep.delay || "0", 10);
  const delayMin = Math.round(delaySec / 60);
  const canceled = dep.canceled === "1";
  const isExtra = dep.isExtra === "1";
  const left = dep.left === "1";
  const platChanged = dep.platforminfo && dep.platforminfo.normal === "0";
  const plat = (dep.platforminfo && dep.platforminfo.name) || dep.platform || "–";
  const veh = (dep.vehicleinfo && dep.vehicleinfo.shortname) || (dep.vehicle || "").split(".").pop();

  const delayHtml = canceled
    ? `<span class="delay late">cancelled</span>`
    : (delayMin > 0
        ? `<span class="delay late">+${delayMin} min</span>`
        : `<span class="delay ontime">on time</span>`);

  const occ = occupancyLabel(dep.occupancy);
  const meta = [];
  meta.push(`<span class="veh">${veh || "?"}</span>`);
  if (left) meta.push(`<span>departed</span>`);
  if (isExtra) meta.push(`<span class="badge-extra">extra train</span>`);
  if (canceled) meta.push(`<span class="badge-cancel">CANCELLED</span>`);
  if (occ) meta.push(`<span class="occ">${occ}</span>`);

  return `
    <div class="row ${canceled ? "canceled" : ""}">
      <div class="time">${fmtTime(dep.time)}${delayHtml}</div>
      <div class="dest">
        <div class="name">${dep.station}</div>
        <div class="meta">${meta.join("")}</div>
      </div>
      <div class="plat ${platChanged ? "changed" : ""}">
        <span class="lbl">PLATF.</span><span class="val">${plat}</span>
      </div>
    </div>`;
}

async function loadStation(name) {
  const body = document.getElementById("body-" + name);
  const count = document.getElementById("count-" + name);
  const url = `${API}?station=${encodeURIComponent(name)}&format=json&lang=en&alerts=true`;
  try {
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const deps = (data.departures && data.departures.departure) || [];
    count.textContent = deps.length ? `${deps.length} departures` : "";
    body.innerHTML = deps.length
      ? deps.map(renderDeparture).join("")
      : `<div class="empty">No upcoming departures right now.</div>`;
  } catch (err) {
    count.textContent = "";
    body.innerHTML = `<div class="error">Couldn't load ${name}: ${err.message}.<br>Check your connection and try Refresh.</div>`;
  }
}

// ---------- Direct Diest -> Halle tracker ----------
const CONN = "https://api.irail.be/v1/connections";
const pad = n => String(n).padStart(2, "0");

async function loadTracker() {
  const statsEl = document.getElementById("tracker-stats");
  const bodyEl = document.getElementById("tracker-body");
  const countEl = document.getElementById("tracker-count");
  try {
    const now = new Date();
    const dd = pad(now.getDate()), mm = pad(now.getMonth() + 1), yy = String(now.getFullYear()).slice(2);
    const dateStr = dd + mm + yy;
    const nowSec = Math.floor(now.getTime() / 1000);

    const trips = new Map();          // key: depTime|vehicle
    let cursor = new Date(now); cursor.setHours(0, 0, 0, 0);   // start of today
    let lastDep = 0;

    for (let i = 0; i < 30; i++) {
      const timeStr = pad(cursor.getHours()) + pad(cursor.getMinutes());
      const url = `${CONN}?from=Diest&to=Halle&date=${dateStr}&time=${timeStr}&timesel=departure&format=json&lang=en`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      const conns = (data && data.connection) || [];
      if (!conns.length) break;

      for (const c of conns) {
        if (parseInt((c.vias && c.vias.number) || "0", 10) !== 0) continue;  // direct only
        const dep = c.departure, arr = c.arrival, depT = parseInt(dep.time, 10);
        if (depT > nowSec) continue;                                         // not yet departed
        const veh = (dep.vehicleinfo && dep.vehicleinfo.shortname) || (dep.vehicle || "").split(".").pop();
        trips.set(depT + "|" + veh, {
          depT, veh,
          depDelay: parseInt(dep.delay || "0", 10),
          platform: (dep.platforminfo && dep.platforminfo.name) || dep.platform || "–",
          arrDelay: parseInt(arr.delay || "0", 10),
          canceled: dep.canceled === "1" || arr.canceled === "1",
        });
      }

      let maxDep = Math.max(...conns.map(c => parseInt(c.departure.time, 10)));
      if (maxDep <= lastDep) maxDep = lastDep + 3600;     // guarantee progress
      lastDep = maxDep;
      if (lastDep > nowSec + 1800) break;                  // past "now"
      cursor = new Date((lastDep + 60) * 1000);
    }

    const rows = [...trips.values()].sort((a, b) => a.depT - b.depT);
    countEl.textContent = rows.length ? `${rows.length} trips` : "";

    const ran = rows.filter(r => !r.canceled);
    const arrMin = ran.map(r => Math.round(r.arrDelay / 60));
    const onTime = arrMin.filter(m => m <= 0).length;
    const avg = arrMin.length ? (arrMin.reduce((a, b) => a + b, 0) / arrMin.length) : 0;
    const worst = arrMin.length ? Math.max(...arrMin) : 0;
    const pct = arrMin.length ? Math.round(100 * onTime / arrMin.length) : 0;

    statsEl.innerHTML = `
      <div class="stat"><div class="k">Direct trips</div><div class="v">${rows.length}</div></div>
      <div class="stat"><div class="k">On time</div>
        <div class="v ${pct >= 80 ? "good" : pct >= 50 ? "warn" : "bad"}">${pct}%</div></div>
      <div class="stat"><div class="k">Avg arr. delay</div>
        <div class="v ${avg < 1 ? "good" : avg < 3 ? "warn" : "bad"}">${avg.toFixed(1)}m</div></div>
      <div class="stat"><div class="k">Worst delay</div>
        <div class="v ${worst <= 0 ? "good" : worst < 5 ? "warn" : "bad"}">${worst > 0 ? "+" + worst + "m" : "0"}</div></div>`;

    bodyEl.innerHTML = rows.length ? `
      <table class="trips">
        <thead><tr><th>Dep</th><th>Train</th><th>Plat.</th><th>Dep delay</th><th>Arr delay</th><th>Result</th></tr></thead>
        <tbody>
          ${rows.map(r => {
            const dd2 = Math.round(r.depDelay / 60), ad = Math.round(r.arrDelay / 60);
            const cls = r.canceled ? "canc" : ad >= 5 ? "vlate" : ad > 0 ? "late" : "";
            const result = r.canceled ? "cancelled" : ad > 0 ? `🟠 +${ad}m late` : ad < 0 ? "🟢 early" : "🟢 on time";
            return `<tr class="${cls}">
              <td>${fmtTime(r.depT)}</td>
              <td><span class="ic">${r.veh}</span></td>
              <td>${r.platform}</td>
              <td class="d">${dd2 > 0 ? "+" + dd2 + "m" : "0"}</td>
              <td class="d">${ad !== 0 ? (ad > 0 ? "+" : "") + ad + "m" : "0"}</td>
              <td class="s">${result}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>` : `<div class="empty">No direct departures recorded yet today.</div>`;
  } catch (err) {
    statsEl.innerHTML = "";
    countEl.textContent = "";
    bodyEl.innerHTML = `<div class="error">Couldn't load tracker: ${err.message}.</div>`;
  }
}

async function loadAll() {
  const btn = document.getElementById("refresh");
  const label = document.getElementById("btn-label");
  btn.disabled = true;
  label.innerHTML = `<span class="spin"></span> Refreshing`;
  await Promise.all([...STATIONS.map(loadStation), loadTracker()]);
  const now = new Date();
  document.getElementById("updated").textContent =
    "Updated " + now.toLocaleTimeString("nl-BE", { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
  label.textContent = "Refresh";
  btn.disabled = false;
}

loadAll();
</script>
</body>
</html>
